// --- Export ---
function bindExport(node,content){
  const $=s=>content.querySelector(s);
  const getCurrentSprite=()=>CM.getInputData(node.id,'sprite');
  const getCurrentImages=()=>CM.getInputData(node.id,'images');
  const initialSprite=getCurrentSprite();
  const initialImages=getCurrentImages();
  if(initialSprite&&initialSprite.dataUrl){$('#d_expPreview').innerHTML='<img src="'+initialSprite.dataUrl+'" style="max-width:100%;border-radius:6px">'}
  else if(initialImages&&getPrimaryDataUrl(initialImages)){$('#d_expPreview').innerHTML='<img src="'+getPrimaryDataUrl(initialImages)+'" style="max-width:100%;border-radius:6px">'}
  $('#d_expPng').addEventListener('click',()=>{
    const upSprite=getCurrentSprite();
    const upImages=getCurrentImages();
    const spriteUrl=upSprite&&upSprite.dataUrl;
    const imageUrl=upImages&&getPrimaryDataUrl(upImages);
    if(spriteUrl){const a=document.createElement('a');a.download='sprite.png';a.href=spriteUrl;a.click()}
    else if(imageUrl){const a=document.createElement('a');a.download='image.png';a.href=imageUrl;a.click()}
    else if(S.spriteData){const a=document.createElement('a');a.download='sprite.png';a.href=S.spriteData.image;a.click()}
    else if(S.directSpriteData){const a=document.createElement('a');a.download='sprite.png';a.href=S.directSpriteData.image;a.click()}
  });
  $('#d_expJson').addEventListener('click',()=>{
    const upSprite=getCurrentSprite();
    let d=(upSprite&&upSprite.frames)?upSprite:(S.spriteData||S.directSpriteData);
    if(!d||!d.frames){showToast('当前输入不是精灵图，无法导出 JSON','warning');return}
    const j={frames:{},meta:d.meta||{}};
    d.frames.forEach(f=>{j.frames[f.name]={frame:{x:f.x,y:f.y,w:f.width,h:f.height},rotated:false,trimmed:false,spriteSourceSize:{x:0,y:0,w:f.width,h:f.height},sourceSize:{w:f.width,h:f.height}}});
    dl(JSON.stringify(j,null,2),'sprite.json','application/json');
  });
  $('#d_expGif').addEventListener('click',async()=>{
    const upSprite=getCurrentSprite();
    const upImages=getCurrentImages();
    const fps=parseInt(node.config&&node.config.gifFps||12)||12;
    if(upSprite&&upSprite.sourceFrames&&upSprite.sourceFrames.length){
      let w=512,h=512;
      if(upSprite.frames&&upSprite.frames.length){const rect=getSpriteFrameRect(upSprite.frames[0]);w=rect.w||w;h=rect.h||h}
      await exportGif(upSprite.sourceFrames,w,h,fps,false,content);
      return;
    }
    if(upSprite&&upSprite.dataUrl&&upSprite.frames&&upSprite.frames.length){
      await exportGifFromSprite(upSprite,fps,content);
      return;
    }
    if(upImages){
      const imageFrames=await resolveImageInputFrames(node);
      if(imageFrames.length){
        const first=imageFrames[0]||{};
        await exportGif(imageFrames,first._w||512,first._h||512,fps,false,content);
        return;
      }
    }
    const fallbackFrames=(S.processedFrames.length&&S.processedFrames)||S.frames.filter(f=>f.selected);
    if(!fallbackFrames.length){showToast('无帧数据','warning');return}
    await exportGif(fallbackFrames,512,512,fps,false,content);
  });
}


async function exportGifFromSprite(spriteData,fps,content){
  const frames=await buildFramesFromSpriteAtlas(spriteData);
  if(!frames.length){showToast('无法从精灵图切出帧','warning');return}
  let w=frames[0]._w||512,h=frames[0]._h||512;
  if(spriteData&&spriteData.frames&&spriteData.frames.length){
    const rect=getSpriteFrameRect(spriteData.frames[0]);
    w=rect.w||w;h=rect.h||h;
  }
  await exportGif(frames,w,h,fps,false,content);
}

// === Business Logic ===

function rgbHex(r,g,b){return '#'+[r,g,b].map(x=>x.toString(16).padStart(2,'0')).join('')}
function colorDistance(a,b){return Math.sqrt((a.r-b.r)**2+(a.g-b.g)**2+(a.b-b.b)**2)}
function removeBg(src,tol,tolerance,feather){
  const c=document.createElement('canvas');c.width=src.width;c.height=src.height;const ctx=c.getContext('2d');ctx.drawImage(src,0,0);
  const id=ctx.getImageData(0,0,c.width,c.height),d=id.data;
  for(let i=0;i<d.length;i+=4){const dist=colorDistance({r:d[i],g:d[i+1],b:d[i+2]},tol);if(dist<=tolerance)d[i+3]=0;else if(dist<=tolerance+feather*10)d[i+3]=Math.min(255,Math.max(0,255*(dist-tolerance)/(feather*10)))}
  ctx.putImageData(id,0,0);return c;
}
function applyPixelArt(src,ps,cl,outline){
  const w=src.width,h=src.height,ps2=Math.max(2,ps),cl2=Math.max(2,cl);
  const sw=Math.max(1,Math.ceil(w/ps2)),sh=Math.max(1,Math.ceil(h/ps2));
  const sm=document.createElement('canvas');sm.width=sw;sm.height=sh;sm.getContext('2d').drawImage(src,0,0,sw,sh);
  const id=sm.getContext('2d').getImageData(0,0,sw,sh),d=id.data,step=255/(cl2-1);
  for(let i=0;i<d.length;i+=4)if(d[i+3]>0){d[i]=Math.round(Math.round(d[i]/step)*step);d[i+1]=Math.round(Math.round(d[i+1]/step)*step);d[i+2]=Math.round(Math.round(d[i+2]/step)*step)}
  sm.getContext('2d').putImageData(id,0,0);
  if(outline){const od=sm.getContext('2d').getImageData(0,0,sw,sh),dd=od.data,rr=new Uint8ClampedArray(dd);
    for(let y=0;y<sh;y++)for(let x=0;x<sw;x++){const idx=(y*sw+x)*4;if(rr[idx+3]===0){for(const[nx,ny]of[[x-1,y],[x+1,y],[x,y-1],[x,y+1]]){if(nx>=0&&nx<sw&&ny>=0&&ny<sh){const ni=(ny*sw+nx)*4;if(rr[ni+3]>0){dd[idx]=20;dd[idx+1]=20;dd[idx+2]=30;dd[idx+3]=255;break}}}}}
    sm.getContext('2d').putImageData(od,0,0)}
  const res=document.createElement('canvas');res.width=w;res.height=h;const rc=res.getContext('2d');rc.imageSmoothingEnabled=false;rc.drawImage(sm,0,0,w,h);return res;
}
function buildQuantizer(pixels,maxC){
  const w=pixels.width,h=pixels.height,d=pixels.data,samples=[];
  for(let y=0;y<h;y+=8)for(let x=0;x<w;x+=8){const i=(y*w+x)*4;if(d[i+3]>128)samples.push([d[i],d[i+1],d[i+2]])}
  if(!samples.length){const p=new Uint8Array(768);return{palette:p,findIndex:()=>0}}
  let bkts=[samples];while(bkts.length<maxC){let mi=0,mr=0;for(let i=0;i<bkts.length;i++){const b=bkts[i];if(b.length<2)continue;let rMin=255,rMax=0,gMin=255,gMax=0,bMin=255,bMax=0;for(const c of b){if(c[0]<rMin)rMin=c[0];if(c[0]>rMax)rMax=c[0];if(c[1]<gMin)gMin=c[1];if(c[1]>gMax)gMax=c[1];if(c[2]<bMin)bMin=c[2];if(c[2]>bMax)bMax=c[2]}const rng=Math.max(rMax-rMin,gMax-gMin,bMax-bMin);if(rng>mr){mr=rng;mi=i}}if(!mr)break;
    const b=bkts[mi];let rMin=255,rMax=0,gMin=255,gMax=0,bMin=255,bMax=0;for(const c of b){if(c[0]<rMin)rMin=c[0];if(c[0]>rMax)rMax=c[0];if(c[1]<gMin)gMin=c[1];if(c[1]>gMax)gMax=c[1];if(c[2]<bMin)bMin=c[2];if(c[2]>bMax)bMax=c[2]}
    const ch=rMax-rMin>=gMax-gMin&&rMax-rMin>=bMax-bMin?0:gMax-gMin>=bMax-bMin?1:2;b.sort((a,c)=>a[ch]-c[ch]);const mid=b.length>>1;bkts.splice(mi,1,b.slice(0,mid),b.slice(mid))}
  const colors=bkts.map(b=>{if(!b.length)return[0,0,0];let r=0,g=0,b2=0;for(const c of b){r+=c[0];g+=c[1];b2+=c[2]}return[r/b.length|0,g/b.length|0,b2/b.length|0]});
  while(colors.length<256)colors.push([0,0,0]);
  const pal=new Uint8Array(256*3);for(let i=0;i<256;i++){pal[i*3]=colors[i][0];pal[i*3+1]=colors[i][1];pal[i*3+2]=colors[i][2]}
  return{palette:pal,findIndex:(r,g,b)=>{let best=0,bd=Infinity;for(let i=0;i<colors.length;i++){const dr=r-colors[i][0],dg=g-colors[i][1],db=b-colors[i][2],d=dr*dr+dg*dg+db*db;if(d<bd){bd=d;best=i}}return best}};
}
function lzwEncode(pixels,cd){
  const mcs=Math.max(2,cd),cc=1<<mcs,eoi=cc+1;const tbl=new Map();let cs=mcs+1,nc=cc+2;const out=[];let buf=0,cnt=0;
  const emit=c=>{buf|=c<<cnt;cnt+=cs;while(cnt>=8){out.push(buf&0xFF);buf>>>=8;cnt-=8}};
  out.push(mcs);tbl.clear();emit(cc);let prefix=pixels[0];
  for(let i=1;i<pixels.length;i++){const k=pixels[i],combined=(prefix<<8)|k;let code=tbl.get(combined);
    if(code!==undefined)prefix=code;else{emit(prefix);if(nc<4096){tbl.set(combined,nc++);if(nc>(1<<cs))cs=Math.min(12,cs+1)}else{emit(cc);tbl.clear();cs=mcs+1;nc=cc+2}prefix=k}}
  emit(prefix);emit(eoi);if(cnt>0)out.push(buf&0xFF);
  const result=[out[0]];for(let i=1;i<out.length;i+=255){const end=Math.min(i+255,out.length);result.push(end-i);for(let j=i;j<end;j++)result.push(out[j])}result.push(0);return result;
}
function buildGIF(frames,w,h,delay,pal,ti){
  const o=[];const wv=v=>o.push(v&0xFF);const w16=v=>o.push(v&0xFF,(v>>8)&0xFF);const ws=s=>{for(let i=0;i<s.length;i++)o.push(s.charCodeAt(i))};
  ws('GIF89a');w16(w);w16(h);wv(0x87);wv(0);wv(0);for(let i=0;i<256;i++){wv(pal[i*3]||0);wv(pal[i*3+1]||0);wv(pal[i*3+2]||0)}
  ws('\x21\xFF\x0BNETSCAPE2.0');wv(3);wv(1);w16(0);wv(0);const d=Math.max(2,Math.round(delay/10));
  for(const f of frames){ws('\x21\xF9\x04');wv(ti>=0?0x09:0x04);w16(d);wv(ti>=0?ti:0);wv(0);wv(0x2C);w16(0);w16(0);w16(w);w16(h);wv(0);const lzw=lzwEncode(f.pixels,8);for(const b of lzw)wv(b)}
  wv(0x3B);return new Uint8Array(o);
}
async function exportGif(frames,fw,fh,fps,pixelArt,content,node){
  showProgress('生成 GIF...');const c=document.createElement('canvas');c.width=fw;c.height=fh;const ctx=c.getContext('2d');
  const allImg=[];for(let i=0;i<frames.length;i++){await new Promise(r=>{const img=new Image();img.onload=()=>{ctx.clearRect(0,0,fw,fh);const sc=Math.min(fw/img.width,fh/img.height);ctx.drawImage(img,(fw-img.width*sc)/2,(fh-img.height*sc)/2,img.width*sc,img.height*sc);
    if(pixelArt){const pa=applyPixelArt(c,4,4,false);ctx.clearRect(0,0,fw,fh);ctx.drawImage(pa,0,0)}
    allImg.push(ctx.getImageData(0,0,fw,fh));updateProgress((i+1)/frames.length*50);r()};img.src=frames[i].dataUrl})}
  updateProgress(60);const merged={width:fw,height:fh,data:new Uint8ClampedArray(fw*fh*4)};const ml=fw*fh*4;
  for(let i=0;i<ml;i+=4){let r=0,g=0,b=0,cnt=0;for(const id of allImg){const a=id.data[i+3];if(a>10){if(a>128){r+=id.data[i];g+=id.data[i+1];b+=id.data[i+2]}else{const al=a/255;r+=(id.data[i]*al+255*(1-al))|0;g+=(id.data[i+1]*al+255*(1-al))|0;b+=(id.data[i+2]*al+255*(1-al))|0}cnt++}}
    if(cnt>0){merged.data[i]=r/cnt|0;merged.data[i+1]=g/cnt|0;merged.data[i+2]=b/cnt|0;merged.data[i+3]=255}}
  const q=buildQuantizer(merged,255);const gp=new Uint8Array(768);for(let i=0;i<255;i++){gp[(i+1)*3]=q.palette[i*3];gp[(i+1)*3+1]=q.palette[i*3+1];gp[(i+1)*3+2]=q.palette[i*3+2]}
  updateProgress(70);const gf=allImg.map(id=>{const px=new Uint8Array(fw*fh);for(let p=0;p<fw*fh;p++){const i=p*4;px[p]=id.data[i+3]<128?0:q.findIndex(id.data[i],id.data[i+1],id.data[i+2])+1}return{pixels:px}});
  updateProgress(80);const gb=buildGIF(gf,fw,fh,Math.round(1000/fps),gp,0);hideProgress();
  const blob=new Blob([gb],{type:'image/gif'});const url=URL.createObjectURL(blob);const a=document.createElement('a');a.download='animation.gif';a.href=url;a.click();URL.revokeObjectURL(url);
  const dataUrl=await new Promise(resolve=>{const reader=new FileReader();reader.onload=()=>resolve(reader.result);reader.readAsDataURL(blob)});
  if(node){await recordResult('gif',node,{dataUrl,summary:'GIF 已导出'},'GIF 已导出',{previewUrl:dataUrl})}
  showToast('GIF 导出完成','success');
}
function dl(content,name,type){const b=new Blob([content],{type});const u=URL.createObjectURL(b);const a=document.createElement('a');a.download=name;a.href=u;a.click();URL.revokeObjectURL(u)}

document.getElementById('resultsRefreshBtn').addEventListener('click',async()=>{try{const r=await fetch('/api/results');if(r.ok){const data=await r.json();S.resultLibrary=Array.isArray(data.results)?data.results:S.resultLibrary;PM.saveResults();}}catch{}renderResultsPanel()});

document.getElementById('settingsCancelBtn').addEventListener('click',()=>document.getElementById('settingsModal').classList.remove('vis'));
document.getElementById('settingsSaveBtn').addEventListener('click',()=>{const v=document.getElementById('sessionIdInput').value.trim();S.sessionid=v;localStorage.setItem('jimeng_sessionid',v);document.getElementById('settingsModal').classList.remove('vis');updateSessionStatus();showToast(v?'已保存':'已清除','success')});
document.getElementById('serviceStatus').addEventListener('click',async e=>{const s=await refreshServiceStatus();if(document.getElementById('serviceStatusText').textContent==='后端不可达'){showToast('请先运行 node server.js','warning',4000);return}const acts={running:{label:'重启 AI 服务',action:'restart'},starting:{label:'强制重启 AI 服务',action:'restart'},stopped:{label:'启动 AI 服务',action:'start'},error:{label:'重启 AI 服务',action:'restart'}};const entry=acts[s]||acts.error;openContextMenu(e.clientX,e.clientY,[{label:entry.label,action:()=>callServiceAction(entry.action)}])});
refreshServiceStatus();setInterval(refreshServiceStatus,10000);
document.getElementById('resetLayoutBtn').addEventListener('click',()=>PM.reset());
document.getElementById('addNodeBtn').addEventListener('click',e=>{openContextMenu(e.clientX,e.clientY,NODE_CATALOG.filter(nd=>nd.typeId!=='img2img').map(nd=>({label:nd.icon+' '+nd.title,action:()=>{const point=CC.screenToWorld(window.innerWidth/2,180);NM.addNodeAt(nd.typeId,point.x,point.y);PM.save()}})))});

function loadStarterFlow(){
  STARTER_FLOW.nodes.forEach(nd=>NM.createNode(nd.id,nd.x,nd.y,CATALOG_BY_TYPE[nd.typeId]));
  STARTER_FLOW.conns.forEach(c=>CM.addConn(c.from,c.fp,c.to,c.tp,c.type));
}

// === Init ===
CC.init();NM.init();CM.init();
document.getElementById('wfCanvas').addEventListener('click',e=>{if(e.target===CC.canvas||e.target===CC.world||e.target.tagName==='svg'){CM.cancelReconnect();document.getElementById('ctxMenu').classList.remove('vis')}});
if(!PM.load())loadStarterFlow();
renderResultsPanel();
updateSessionStatus();
setInterval(()=>PM.save(),5000);
// === Context Menu ===
(function(){
  const menu=document.getElementById('ctxMenu');
  function hideMenu(){menu.classList.remove('vis')}
  document.addEventListener('click',hideMenu);
  document.getElementById('resultsPanel').addEventListener('click',e=>e.stopPropagation());
  document.getElementById('resultsBtn').addEventListener('click',e=>e.stopPropagation());
  document.addEventListener('contextmenu',e=>{
    const nodeEl=e.target.closest('.wf-node');
    if(nodeEl)return; // don't show on nodes
    const canvasEl=e.target.closest('.wf-canvas');
    if(!canvasEl)return;
    e.preventDefault();
    menu.innerHTML=NODE_CATALOG.filter(nd=>nd.typeId!=='img2img').map(nd=>'<div class="ctx-menu-item" data-type="'+nd.typeId+'"><span>'+nd.icon+'</span><span>'+nd.title+'</span></div>').join('');
    menu.querySelectorAll('.ctx-menu-item').forEach(item=>{
      item.addEventListener('click',()=>{NM.addNodeAt(item.dataset.type,e.clientX,e.clientY);hideMenu();PM.save()});
    });
    menu.style.left=e.clientX+'px';menu.style.top=e.clientY+'px';
    menu.classList.add('vis');
  });
})();
</script>
</body>
</html>
