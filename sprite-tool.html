<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>视频转精灵图工具</title>
<style>
:root{--bg-primary:#0c0f1a;--bg-secondary:#141829;--bg-card:rgba(22,27,48,0.85);--border:rgba(255,255,255,0.08);--border-hover:rgba(99,179,237,0.3);--accent:#63b3ed;--accent2:#a78bfa;--text:#e2e8f0;--text-dim:#94a3b8;--text-muted:#64748b;--success:#34d399;--warning:#fbbf24;--danger:#f87171;--radius:10px;--radius-lg:14px;--port-image:#63b3ed;--port-video:#a78bfa;--port-frames:#34d399;--port-sprite:#fbbf24}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:Inter,-apple-system,BlinkMacSystemFont,sans-serif;background:var(--bg-primary);height:100vh;overflow:hidden;color:var(--text)}
.toolbar{position:fixed;top:0;left:0;right:0;height:48px;background:var(--bg-secondary);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 16px;z-index:100;gap:12px}
.toolbar h1{font-size:1rem;font-weight:600;color:#f1f5f9;white-space:nowrap}
.spacer{flex:1}
.status-badge{display:flex;align-items:center;gap:6px;font-size:.78rem;color:var(--text-dim);cursor:pointer;padding:4px 10px;border-radius:6px;border:1px solid var(--border)}
.status-badge:hover{border-color:var(--border-hover)}
.status-dot{width:8px;height:8px;border-radius:50%;background:#888}
.btn-icon{background:none;border:1px solid var(--border);color:var(--text-muted);border-radius:6px;padding:6px;cursor:pointer;display:flex;align-items:center}
.btn-icon:hover{color:var(--accent);border-color:var(--border-hover)}
.btn-icon svg{width:18px;height:18px}
.zoom-info{font-size:.75rem;color:var(--text-muted);min-width:48px;text-align:center}
.session-indicator{width:6px;height:6px;border-radius:50%;background:var(--text-muted);margin-left:4px}
.session-indicator.on{background:var(--success)}
.wf-canvas{position:fixed;top:48px;left:0;right:0;bottom:0;overflow:hidden;cursor:grab;background:var(--bg-primary);background-image:radial-gradient(circle,rgba(255,255,255,.03) 1px,transparent 1px);background-size:24px 24px}
.wf-canvas.panning{cursor:grabbing}
.wf-world{position:absolute;top:0;left:0;transform-origin:0 0}
.wf-connections{position:absolute;top:0;left:0;width:1px;height:1px;overflow:visible}
.wf-connections path{fill:none;stroke-width:2.5;cursor:pointer}
.wf-connections path:hover{stroke-width:4}
.wf-connections path.sel{stroke-width:4;filter:drop-shadow(0 0 6px currentColor)}
.wf-temp-line{fill:none;stroke:var(--accent);stroke-width:2;stroke-dasharray:8 4;opacity:.7}
.wf-node{position:absolute;width:200px;background:var(--bg-card);border:1.5px solid var(--border);border-radius:var(--radius-lg);backdrop-filter:blur(8px);user-select:none;transition:border-color .2s,box-shadow .2s,width .3s ease}
.wf-node:hover{border-color:var(--border-hover)}
.wf-node.selected{border-color:var(--accent);box-shadow:0 0 20px rgba(99,179,237,.15)}
.wf-node.processing{border-color:var(--warning);animation:pulse-b 1.5s infinite}
.wf-node.done{border-color:var(--success)}
.wf-node.expanded{width:460px}
@keyframes pulse-b{0%,100%{border-color:var(--warning)}50%{border-color:transparent}}
.wf-node-header{display:flex;align-items:center;padding:8px 10px;cursor:grab;gap:6px;border-bottom:1px solid var(--border)}
.wf-node-header:active{cursor:grabbing}
.wf-node-icon{font-size:.9rem;flex-shrink:0}
.wf-node-title{font-size:.78rem;font-weight:600;color:var(--text);flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.wf-node-fold{background:none;border:none;color:var(--text-muted);cursor:pointer;font-size:1rem;line-height:1;padding:0 2px}
.wf-node-fold:hover{color:var(--text)}
.wf-node-body{padding:6px 10px 8px}
.wf-node-body.collapsed{display:none}
.wf-node-summary{font-size:.7rem;color:var(--text-muted);line-height:1.4;min-height:14px}
.wf-node.expanded .wf-node-summary{display:none}
.wf-node-content{display:none;max-height:450px;overflow-y:auto;padding:2px 0}
.wf-node.expanded .wf-node-content{display:block}
.wf-ports{display:flex;justify-content:space-between;padding:4px 0 2px}
.wf-ports-in,.wf-ports-out{display:flex;flex-direction:column;gap:4px}
.wf-port{display:flex;align-items:center;gap:4px;font-size:.65rem;color:var(--text-muted)}
.wf-port.out{flex-direction:row-reverse}
.wf-port-dot{width:10px;height:10px;border-radius:50%;border:2px solid;cursor:crosshair;transition:transform .15s;flex-shrink:0}
.wf-port-dot:hover{transform:scale(1.4)}
button{padding:7px 16px;border:none;border-radius:6px;font-size:.82rem;font-weight:500;cursor:pointer;transition:all .2s;color:#fff;background:linear-gradient(135deg,#3b82f6,#6366f1)}
button:hover:not(:disabled){transform:translateY(-1px);box-shadow:0 4px 14px rgba(99,102,241,.2)}
button:disabled{opacity:.35;cursor:not-allowed;transform:none}
button.secondary{background:rgba(255,255,255,.06);border:1px solid var(--border)}
button.secondary:hover:not(:disabled){background:rgba(255,255,255,.1);border-color:var(--border-hover);box-shadow:none}
button.accent{background:linear-gradient(135deg,#06b6d4,#3b82f6)}
button.success{background:linear-gradient(135deg,#10b981,#06b6d4)}
button.danger{background:linear-gradient(135deg,#ef4444,#f97316)}
button.primary-action{padding:10px 24px;font-size:.88rem;font-weight:600}
.cg{display:flex;align-items:center;gap:8px}
.cg label{color:var(--text-dim);font-size:.82rem}
input[type=number],input[type=text],select{padding:6px 10px;border:1px solid var(--border);border-radius:6px;background:rgba(0,0,0,.3);color:#fff;font-size:.82rem;outline:none}
input[type=number]:focus,input[type=text]:focus{border-color:var(--accent)}
textarea{width:100%;padding:10px;background:rgba(0,0,0,.3);border:1px solid var(--border);border-radius:8px;color:#fff;font-size:.85rem;resize:vertical;outline:none;font-family:inherit}
textarea:focus{border-color:var(--accent)}
input[type=range]{flex:1;accent-color:var(--accent)}
.toggle-label{display:flex;align-items:center;gap:6px;cursor:pointer;font-size:.82rem}
.toggle-label input[type=checkbox]{accent-color:var(--accent)}
.btn-group{display:flex;flex-wrap:wrap;gap:8px}
.hint{font-size:.78rem;color:var(--text-muted);line-height:1.5;margin-bottom:8px}
details{margin:6px 0}details summary{color:var(--text-muted);font-size:.78rem;cursor:pointer}details>div{padding:6px;background:rgba(0,0,0,.15);border-radius:6px;margin-top:4px}
.drop-zone{border:2px dashed rgba(99,179,237,.2);border-radius:var(--radius);padding:20px 16px;text-align:center;cursor:pointer;transition:all .2s;background:rgba(99,179,237,.02)}
.drop-zone:hover,.drop-zone.dragover{border-color:rgba(99,179,237,.5);background:rgba(99,179,237,.06)}
.drop-zone-text{font-size:.82rem;color:var(--text-dim)}
.drop-zone-text span{color:var(--accent);text-decoration:underline}
.drop-zone-hint{margin-top:6px;font-size:.72rem;color:var(--text-muted)}
input[type=file]{display:none}
.frames-toolbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;flex-wrap:wrap;gap:6px}
.frames-info{color:var(--text-dim);font-size:.78rem}
.frames-info span{color:var(--accent);font-weight:600}
.frames-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(70px,1fr));gap:4px;max-height:300px;overflow-y:auto;padding:2px}
.frame-item{position:relative;border-radius:6px;overflow:hidden;cursor:pointer;transition:all .15s;border:2px solid transparent;background:rgba(0,0,0,.25);aspect-ratio:1;display:flex;align-items:center;justify-content:center}
.frame-item:hover{transform:scale(1.03);border-color:rgba(99,179,237,.35)}
.frame-item.selected{border-color:var(--accent);box-shadow:0 0 10px rgba(99,179,237,.2)}
.frame-item img{width:100%;height:100%;object-fit:cover;display:block}
.frame-item .ci{position:absolute;top:3px;left:3px;width:16px;height:16px;border-radius:3px;border:2px solid rgba(255,255,255,.3);background:rgba(0,0,0,.4);display:flex;align-items:center;justify-content:center;pointer-events:none}
.frame-item .ci svg{width:10px;height:10px;stroke:#fff;stroke-width:3;fill:none;opacity:0}
.frame-item.selected .ci{background:var(--accent);border-color:var(--accent)}
.frame-item.selected .ci svg{opacity:1}
.frame-number{position:absolute;bottom:0;left:0;right:0;background:rgba(0,0,0,.7);color:#fff;font-size:.6rem;padding:1px 3px;text-align:center}
.color-picker-area{display:flex;flex-wrap:wrap;gap:12px;align-items:flex-start}
.picker-preview{flex:1;min-width:180px}
.picker-canvas-container{position:relative;display:inline-block;border-radius:var(--radius);overflow:hidden;border:1px solid var(--border);background:repeating-conic-gradient(rgba(255,255,255,.03) 0% 25%,transparent 0% 50%) 0 0/16px 16px}
#pickerCanvas{display:block;max-width:100%;cursor:crosshair}
.picker-cursor{position:absolute;width:20px;height:20px;border:2px solid #fff;border-radius:50%;pointer-events:none;transform:translate(-50%,-50%);display:none;z-index:10}
.picker-cursor .pc{width:100%;height:100%;border-radius:50%}
.picker-cursor .ph{position:absolute;bottom:calc(100% + 3px);left:50%;transform:translateX(-50%);background:rgba(0,0,0,.85);color:#fff;font-size:.6rem;padding:1px 3px;border-radius:3px;white-space:nowrap;pointer-events:none;font-family:monospace}
.picker-controls{flex:0 0 180px}
.color-display{display:flex;align-items:center;gap:8px;margin-bottom:10px;padding:8px;background:rgba(0,0,0,.2);border-radius:var(--radius);border:1px solid var(--border)}
.color-box{width:28px;height:28px;border-radius:4px;border:1px solid var(--border)}
.color-value{font-family:monospace;color:var(--text);font-size:.8rem}
.slider-group{margin-bottom:10px}
.slider-group label{display:flex;justify-content:space-between;color:var(--text-dim);font-size:.75rem;margin-bottom:4px}
.slider-group .val{color:var(--accent);font-weight:600}
.sprite-options{display:flex;flex-direction:column;gap:10px}
.sprite-preview{display:none;margin-top:10px}
.sprite-preview canvas{max-width:100%;border-radius:var(--radius)}
.sprite-info{margin-top:6px;font-size:.78rem;color:var(--text-dim)}
.sprite-info strong{color:var(--text)}
.export-bar{display:flex;flex-wrap:wrap;align-items:center;gap:6px;margin-top:8px}
.preset-btn{padding:3px 8px;font-size:.75rem;background:rgba(255,255,255,.05);border:1px solid var(--border);border-radius:4px;cursor:pointer;color:var(--text-dim)}
.preset-btn:hover{border-color:var(--border-hover);color:var(--text)}
.preset-btn.active{border-color:var(--accent);color:var(--accent);background:rgba(99,179,237,.1)}
.ai-results-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(100px,1fr));gap:8px}
.ai-result-item{position:relative;border-radius:6px;border:2px solid var(--border);cursor:pointer;transition:all .2s;overflow:hidden}
.ai-result-item:hover{border-color:var(--border-hover)}
.ai-result-item.selected{border-color:var(--accent);box-shadow:0 0 10px rgba(99,179,237,.2)}
.ai-result-item img{width:100%;display:block}
.ai-result-item .arc{position:absolute;top:3px;right:3px;width:16px;height:16px;border-radius:50%;background:var(--accent);display:none;align-items:center;justify-content:center}
.ai-result-item.selected .arc{display:flex}
.ai-loading{text-align:center;padding:20px 0;color:var(--text-dim)}
.ai-loading .spinner{width:24px;height:24px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 8px}
@keyframes spin{to{transform:rotate(360deg)}}
.progress-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:300;align-items:center;justify-content:center;backdrop-filter:blur(3px)}
.progress-overlay.vis{display:flex}
.progress-box{background:var(--bg-secondary);border:1px solid var(--border);border-radius:var(--radius-lg);padding:24px 32px;min-width:280px;text-align:center}
.progress-text{color:var(--text);font-size:.88rem;margin-bottom:14px}
.progress-bar{height:6px;background:rgba(255,255,255,.06);border-radius:3px;overflow:hidden}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2));border-radius:3px;transition:width .3s}
.progress-percent{color:var(--text-muted);font-size:.78rem;margin-top:6px}
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:250;align-items:center;justify-content:center;backdrop-filter:blur(4px)}
.modal-overlay.vis{display:flex}
.modal{background:var(--bg-secondary);border:1px solid var(--border);border-radius:var(--radius-lg);padding:20px;max-width:400px;width:90%}
.modal h3{font-size:1rem;margin-bottom:12px}
.modal p{color:var(--text-dim);font-size:.8rem;line-height:1.5;margin-bottom:8px}
.modal input[type=text]{width:100%;padding:8px 12px;background:var(--bg-primary);border:1px solid var(--border);border-radius:6px;color:var(--text);font-size:.85rem;margin-bottom:12px}
.modal input[type=text]:focus{border-color:var(--accent);outline:none}
.btn-row{display:flex;gap:8px;justify-content:flex-end}
.toast-container{position:fixed;top:56px;right:16px;z-index:400;display:flex;flex-direction:column;gap:8px}
.toast{display:flex;align-items:center;gap:8px;padding:10px 16px;background:var(--bg-secondary);border:1px solid var(--border);border-radius:8px;font-size:.82rem;color:var(--text);box-shadow:0 4px 20px rgba(0,0,0,.3);animation:tIn .3s ease;max-width:360px}
.toast.out{animation:tOut .3s ease forwards}
.toast svg{width:16px;height:16px;flex-shrink:0}
@keyframes tIn{from{opacity:0;transform:translateX(40px)}to{opacity:1;transform:translateX(0)}}
@keyframes tOut{from{opacity:1;transform:translateX(0)}to{opacity:0;transform:translateX(40px)}}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:rgba(255,255,255,.08);border-radius:3px}
.ctx-menu{position:fixed;z-index:500;background:var(--bg-secondary);border:1px solid var(--border);border-radius:var(--radius);padding:6px 0;min-width:180px;box-shadow:0 8px 30px rgba(0,0,0,.4);display:none}
.ctx-menu.vis{display:block}
.ctx-menu-item{display:flex;align-items:center;gap:8px;padding:8px 14px;cursor:pointer;font-size:.82rem;color:var(--text);transition:background .15s}
.ctx-menu-item:hover{background:rgba(99,179,237,.1)}
.ctx-menu-item span:first-child{font-size:1rem}
.node-delete{margin-top:10px;width:100%;padding:5px 12px;font-size:.75rem;background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.3);color:var(--danger);border-radius:6px;cursor:pointer;transition:all .2s}
.node-delete:hover{background:rgba(239,68,68,.2);border-color:var(--danger)}
.node-delete-confirm{display:flex;gap:8px;margin-top:10px}
.node-delete-confirm button{flex:1}
@media(max-width:640px){.wf-node.expanded{width:95vw}}
.results-panel{position:fixed;top:48px;right:0;bottom:0;width:340px;background:var(--bg-secondary);border-left:1px solid var(--border);z-index:95;transform:translateX(100%);transition:transform .22s ease;display:flex;flex-direction:column}
.results-panel.open{transform:translateX(0)}
.results-panel-header{display:flex;align-items:center;gap:8px;padding:12px 14px;border-bottom:1px solid var(--border)}
.results-panel-title{font-size:.9rem;font-weight:600;color:var(--text)}
.results-panel-list{flex:1;overflow-y:auto;padding:12px;display:flex;flex-direction:column;gap:10px}
.result-empty{padding:18px 12px;border:1px dashed var(--border);border-radius:10px;color:var(--text-muted);font-size:.8rem;text-align:center}
.result-card{border:1px solid var(--border);border-radius:10px;background:rgba(255,255,255,.03);overflow:hidden}
.result-preview{height:140px;background:rgba(0,0,0,.25);display:flex;align-items:center;justify-content:center}
.result-preview img,.result-preview video{max-width:100%;max-height:100%;display:block}
.result-body{padding:10px}
.result-type{font-size:.72rem;color:var(--accent);margin-bottom:4px}
.result-summary{font-size:.82rem;color:var(--text);line-height:1.45;margin-bottom:4px;word-break:break-word}
.result-meta{font-size:.72rem;color:var(--text-muted);line-height:1.45;word-break:break-word}
.result-path{margin-top:4px;font-family:monospace;font-size:.68rem;color:var(--text-muted);word-break:break-all}
.result-actions{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px}
.result-actions button{flex:1;min-width:88px;padding:6px 10px;font-size:.75rem}
</style>
</head>
<body>
<div class="toolbar">
<h1>视频转精灵图工具</h1>
<div class="spacer"></div>
<div class="zoom-info" id="zoomInfo">100%</div>
<button class="btn-icon" id="zoomResetBtn" title="重置视图"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg></button>
<button class="btn-icon" id="resetLayoutBtn" title="重置布局"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg></button>
<button class="btn-icon" id="addNodeBtn" title="添加节点"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14"/><path d="M5 12h14"/></svg></button>
<button class="btn-icon" id="collapseNodesBtn" title="收起所有节点">收起</button>
<button class="btn-icon" id="resultsBtn" title="结果库">结果库</button>
<div class="status-badge" id="serviceStatus"><span class="status-dot" id="serviceStatusDot"></span><span id="serviceStatusText">检查中...</span></div>
<button class="btn-icon" id="settingsBtn" title="设置"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg><span class="session-indicator" id="sessionDot"></span></button>
</div>
<div class="wf-canvas" id="wfCanvas"><div class="wf-world" id="wfWorld"><svg class="wf-connections" id="wfConnections"></svg></div></div>
<div class="results-panel" id="resultsPanel"><div class="results-panel-header"><div class="results-panel-title">结果库</div><div class="spacer"></div><button class="btn-icon" id="resultsRefreshBtn" title="刷新结果">刷新</button><button class="btn-icon" id="resultsCloseBtn" title="关闭结果库">关闭</button></div><div class="results-panel-list" id="resultsList"></div></div>
<div class="modal-overlay" id="settingsModal"><div class="modal"><h3>即梦 AI 设置</h3><p>输入即梦 AI 的 sessionid 以启用 AI 功能。</p><p style="color:var(--text-muted);font-size:.75rem">获取：jimeng.jianying.com -&gt; F12 -&gt; Cookies -&gt; sessionid</p><input type="text" id="sessionIdInput" placeholder="粘贴 sessionid..."><div class="btn-row"><button class="secondary" id="settingsCancelBtn">取消</button><button class="accent" id="settingsSaveBtn">保存</button></div></div></div>
<div class="progress-overlay" id="progressOverlay"><div class="progress-box"><div class="progress-text" id="progressText">正在处理...</div><div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div><div class="progress-percent" id="progressPercent">0%</div></div></div>
<div class="ctx-menu" id="ctxMenu"></div>
<div class="toast-container" id="toastContainer"></div>
<script>
// === State ===
const S={video:null,frames:[],processedFrames:[],selectedColor:null,tolerance:30,feather:2,lastClickedFrame:-1,sessionid:localStorage.getItem('jimeng_sessionid')||'',generatedImages:{},selectedImages:{},generatedVideo:null,spriteData:null,directSpriteData:null,img2imgResults:{},pendingVideos:{},resultLibrary:[]};
const RESULT_TYPE_LABELS={image:'AI 图片',video:'AI 视频',gif:'GIF',sprite:'精灵图'};
const RESULT_REUSE_TARGETS={image:['aiImage','img2img','removeBg','export'],video:['importVideo'],sprite:['export','removeBg','aiImage'],gif:[]};

// === Toast ===

// === Canvas Controller ===
const CC={
  canvas:null,world:null,scale:1,tx:0,ty:0,dragging:false,sx:0,sy:0,stx:0,sty:0,
  init(){
    this.canvas=document.getElementById('wfCanvas');
    this.world=document.getElementById('wfWorld');
    this.canvas.addEventListener('wheel',e=>{e.preventDefault();const d=e.deltaY>0?0.9:1.1;this.scale=Math.max(.25,Math.min(2,this.scale*d));this.apply();document.getElementById('zoomInfo').textContent=Math.round(this.scale*100)+'%';CM.update()},{passive:false});
    this.canvas.addEventListener('pointerdown',e=>{if(e.target===this.canvas||e.target===this.world||e.target.tagName==='svg'){this.dragging=true;this.sx=e.clientX;this.sy=e.clientY;this.stx=this.tx;this.sty=this.ty;this.canvas.classList.add('panning');e.preventDefault()}});
    window.addEventListener('pointermove',e=>{if(!this.dragging)return;this.tx=this.stx+(e.clientX-this.sx);this.ty=this.sty+(e.clientY-this.sy);this.apply()});
    window.addEventListener('pointerup',()=>{this.dragging=false;this.canvas.classList.remove('panning')});
    document.getElementById('zoomResetBtn').addEventListener('click',()=>{this.scale=1;this.tx=0;this.ty=0;this.apply();document.getElementById('zoomInfo').textContent='100%';CM.update()});
    this.centerView();
  },
  apply(){this.world.style.transform='translate('+this.tx+'px,'+this.ty+'px) scale('+this.scale+')'},
  centerView(){this.tx=Math.max(20,window.innerWidth/2-500);this.ty=Math.max(20,window.innerHeight/2-200);this.apply()},
  screenToWorld(cx,cy){return{x:(cx-this.tx)/this.scale,y:(cy-this.ty-48)/this.scale}}
};

function cloneValue(v){return JSON.parse(JSON.stringify(v))}
function ensureNodeConfig(node){node.config=node.config||cloneValue(node.def.defaultConfig||{});return node.config}
function ensureNodeRuntime(node){node.runtime=node.runtime||{};return node.runtime}
function bindConfigValue(node,content,selector,key,options={}){
  const el=content.querySelector(selector);if(!el)return;
  const config=ensureNodeConfig(node);
  const eventName=options.eventName||(el.type==='checkbox'?'change':'input');
  const readValue=options.readValue||(()=>el.type==='checkbox'?el.checked:el.value);
  const writeValue=options.writeValue||((value)=>{if(el.type==='checkbox')el.checked=!!value;else if(value!=null)el.value=value});
  if(config[key]!=null)writeValue(config[key]);
  el.addEventListener(eventName,()=>{config[key]=readValue();PM.save()});
}

// === Node Manager ===
let _nodeCounter=0;
const NM={
  nodes:{},selected:null,
  init(){},
  collapseAllExpanded(exceptId=null){
    Object.values(this.nodes).forEach(node=>{
      if(node.id!==exceptId&&node.expanded)this.collapseNode(node.id);
    });
  },
  createNode(instanceId,x,y,typeDef){
    const nd=typeDef||CATALOG_BY_TYPE[instanceId];if(!nd)return null;
    const id=instanceId;
    const el=document.createElement('div');
    el.className='wf-node';el.dataset.id=id;
    el.style.left=x+'px';el.style.top=y+'px';
    let inPorts=nd.ins.map(p=>'<div class="wf-port in" data-port="'+p.id+'" data-type="'+p.type+'"><span class="wf-port-dot" style="border-color:'+PORT_COLORS[p.type]+'"></span><span>'+p.label+'</span></div>').join('');
    let outPorts=nd.outs.map(p=>'<div class="wf-port out" data-port="'+p.id+'" data-type="'+p.type+'"><span>'+p.label+'</span><span class="wf-port-dot" style="border-color:'+PORT_COLORS[p.type]+'"></span></div>').join('');
    el.innerHTML='<div class="wf-node-header"><span class="wf-node-icon">'+nd.icon+'</span><span class="wf-node-title">'+nd.title+'</span><button class="wf-node-fold">_</button></div><div class="wf-node-body" id="body-'+id+'"><div class="wf-node-summary" id="sum-'+id+'">单击展开</div><div class="wf-node-content"></div><div class="wf-ports"><div class="wf-ports-in">'+inPorts+'</div><div class="wf-ports-out">'+outPorts+'</div></div></div>';
    document.getElementById('wfWorld').appendChild(el);
    this.nodes[id]={id,el,def:nd,typeId:nd.typeId,collapsed:false,expanded:false,data:null,status:'idle',contentEl:null,config:cloneValue(nd.defaultConfig||{}),runtime:{}};
    // Drag header (distinguish click vs drag)
    el.querySelector('.wf-node-header').addEventListener('pointerdown',e=>{
      if(e.target.classList.contains('wf-node-fold'))return;
      let dragging=true,moved=false;const dsx=e.clientX,dsy=e.clientY;
      const r=el.getBoundingClientRect();const ox=e.clientX-r.left,oy=e.clientY-r.top;el.style.zIndex=50;e.preventDefault();
      const move=ev=>{
        if(!dragging)return;
        if(!moved&&(Math.abs(ev.clientX-dsx)>3||Math.abs(ev.clientY-dsy)>3))moved=true;
        if(!moved)return;
        el.style.left=(ev.clientX-ox-CC.tx)/CC.scale+'px';el.style.top=(ev.clientY-oy-CC.ty-48)/CC.scale+'px';CM.update();
      };
      const up=()=>{dragging=false;el.style.zIndex='';window.removeEventListener('pointermove',move);window.removeEventListener('pointerup',up);
        if(!moved)NM.toggleExpand(id,{multi:e.shiftKey});CM.update()};
      window.addEventListener('pointermove',move);window.addEventListener('pointerup',up);
    });
    // Fold
    el.querySelector('.wf-node-fold').addEventListener('click',e=>{
      e.stopPropagation();const n=this.nodes[id];n.collapsed=!n.collapsed;
      el.querySelector('.wf-node-body').classList.toggle('collapsed',n.collapsed);
      el.querySelector('.wf-node-fold').textContent=n.collapsed?'+':'_';CM.update();
    });
    // Select
    el.addEventListener('click',e=>{if(this.selected&&this.selected!==id)this.nodes[this.selected].el.classList.remove('selected');this.selected=id;el.classList.add('selected')});
    el.querySelectorAll('.wf-port.in').forEach(port=>{
      port.addEventListener('contextmenu',e=>{
        e.preventDefault();e.stopPropagation();
        CM.openInputDisconnectMenu(id,port.dataset.port,e.clientX,e.clientY);
      });
    });
    // Port drag
    el.querySelectorAll('.wf-port-dot').forEach(dot=>{
      dot.addEventListener('pointerdown',e=>{
        e.stopPropagation();const port=dot.closest('.wf-port');const isOut=port.classList.contains('out');
        if(!isOut)return;
        const svg=document.getElementById('wfConnections');const temp=document.createElementNS('http://www.w3.org/2000/svg','path');
        temp.classList.add('wf-temp-line');svg.appendChild(temp);
        const move=ev=>{
          const cr=dot.getBoundingClientRect();const x1=(cr.left+cr.width/2-CC.tx)/CC.scale;const y1=(cr.top+cr.height/2-CC.ty-48)/CC.scale;
          const x2=(ev.clientX-CC.tx)/CC.scale;const y2=(ev.clientY-CC.ty-48)/CC.scale;
          const dx=Math.abs(x2-x1)*.5;
          temp.setAttribute('d','M'+x1+','+y1+' C'+(x1+dx)+','+y1+' '+(x2-dx)+','+y2+' '+x2+','+y2);
        };
        const up=ev=>{
          svg.removeChild(temp);
          const target=document.elementFromPoint(ev.clientX,ev.clientY);
          if(target&&target.classList.contains('wf-port-dot')){
            const tp=target.closest('.wf-port');if(tp&&!tp.classList.contains('out')){
              const tNode=tp.closest('.wf-node');
              const fromType=port.dataset.type;const toType=tp.dataset.type;
              if(CM.pendingReconnect){CM.completeReconnect(tNode.dataset.id,tp.dataset.port,toType)}
              else if(canConnect(fromType,toType)){CM.addConn(id,port.dataset.port,tNode.dataset.id,tp.dataset.port,fromType)}
              else showToast('端口类型不兼容','warning');
            }
          }
          window.removeEventListener('pointermove',move);window.removeEventListener('pointerup',up);
        };
        window.addEventListener('pointermove',move);window.addEventListener('pointerup',up);
      });
    });
    return id;
  },
  deleteNode(id){
    if(this.nodes[id]&&this.nodes[id].expanded)this.collapseNode(id);
    if(this.selected===id){this.nodes[id].el.classList.remove('selected');this.selected=null}
    CM.conns=CM.conns.filter(c=>{if(c.from===id||c.to===id){if(c.el&&c.el.parentNode)c.el.parentNode.removeChild(c.el);return false}return true});
    const n=this.nodes[id];if(n&&n.el.parentNode)n.el.parentNode.removeChild(n.el);
    delete this.nodes[id];
    showToast('已删除节点','info');
  },
  addNodeAt(typeId,screenX,screenY){
    const nd=CATALOG_BY_TYPE[typeId];if(!nd)return;
    let id='';do{_nodeCounter++;id=nd.typeId+'_'+_nodeCounter}while(this.nodes[id]);
    const wx=(screenX-CC.tx)/CC.scale,wy=(screenY-CC.ty-48)/CC.scale;
    this.createNode(id,wx,wy,nd);
    return id;
  },
  toggleExpand(id,options={}){
    const n=this.nodes[id];if(!n)return;
    const multi=!!options.multi;
    if(n.expanded){this.collapseNode(id);return}
    if(!multi)this.collapseAllExpanded(id);
    this.expandNode(id);
  },
  expandNode(id){
    const n=this.nodes[id];if(!n)return;
    n.expanded=true;n.collapsed=false;n.el.classList.add('expanded');
    const body=n.el.querySelector('.wf-node-body');
    if(body)body.classList.remove('collapsed');
    n.el.querySelector('.wf-node-fold').textContent='_';
    const content=n.el.querySelector('.wf-node-content');n.contentEl=content;
    n.runtime=n.runtime||{};
    const renderer=NODE_RENDERERS[n.typeId];
    if(renderer&&content){
      const deleteHtml=n.runtime.pendingDelete
        ? '<div class="node-delete-confirm"><button class="danger" data-confirm-del="'+id+'">确认删除</button><button class="secondary" data-cancel-del="'+id+'">取消</button></div>'
        : '<button class="node-delete" data-del="'+id+'">删除此节点</button>';
      content.innerHTML=renderer.render(n)+deleteHtml;renderer.bind(n,content);
      const deleteBtn=content.querySelector('[data-del]');
      if(deleteBtn)deleteBtn.addEventListener('click',()=>{n.runtime.pendingDelete=true;NM.expandNode(id)});
      const confirmBtn=content.querySelector('[data-confirm-del]');
      if(confirmBtn)confirmBtn.addEventListener('click',()=>NM.deleteNode(id));
      const cancelBtn=content.querySelector('[data-cancel-del]');
      if(cancelBtn)cancelBtn.addEventListener('click',()=>{n.runtime.pendingDelete=false;NM.expandNode(id)});
    }
    // 两次 update：50ms 用于初始 DOM 布局，350ms 用于 CSS transition (300ms width ease) 完成后
    setTimeout(()=>CM.update(),50);setTimeout(()=>CM.update(),350);
  },
  collapseNode(id){
    const n=this.nodes[id];if(!n)return;
    n.expanded=false;n.collapsed=false;n.el.classList.remove('expanded');
    const body=n.el.querySelector('.wf-node-body');
    if(body)body.classList.remove('collapsed');
    n.el.querySelector('.wf-node-fold').textContent='_';
    const content=n.el.querySelector('.wf-node-content');
    if(content)content.innerHTML='';
    n.contentEl=null;
    // 同上，两次 update 覆盖 CSS 过渡
    setTimeout(()=>CM.update(),50);setTimeout(()=>CM.update(),350);
  },
  setSummary(id,txt){const el=document.getElementById('sum-'+id);if(el)el.textContent=txt},
  setStatus(id,st){const n=this.nodes[id];if(!n)return;n.el.classList.remove('processing','done');if(st==='processing')n.el.classList.add('processing');if(st==='done')n.el.classList.add('done');n.status=st}
};

// === Connection Manager ===
function ensureNodeDataStore(node){
  node.data=node.data||{};
  node.data.inputs=node.data.inputs||{};
  node.data.outputs=node.data.outputs||{};
  return node.data;
}
function getPrimaryDataUrl(data){
  if(!data)return null;
  return data.url||data.blobUrl||data.dataUrl||(data.urls&&data.urls[0])||null;
}
function buildImageSourceUrl(url){
  if(!url||typeof url!=='string')return url;
  if(url.startsWith('blob:')||url.startsWith('data:'))return url;
  if(url.startsWith('/api/jimeng/image-download?url='))return url;
  try{
    const parsed=new URL(url,window.location.origin);
    if(parsed.origin===window.location.origin&&parsed.pathname==='/api/jimeng/image-download')return parsed.toString();
  }catch{}
  return '/api/jimeng/image-download?url='+encodeURIComponent(url);
}
function buildVideoSourceUrl(url){
  if(!url||typeof url!=='string')return url;
  if(url.startsWith('blob:')||url.startsWith('data:'))return url;
  if(url.startsWith('/api/jimeng/video-download?url='))return url;
  try{
    const parsed=new URL(url,window.location.origin);
    if(parsed.origin===window.location.origin&&parsed.pathname==='/api/jimeng/video-download')return parsed.toString();
  }catch{}
  return '/api/jimeng/video-download?url='+encodeURIComponent(url);
}
function syncNodeInputPreview(nodeId,portId,data){
  const node=NM.nodes[nodeId];
  if(!node||!node.expanded||!node.contentEl)return;
  const content=node.contentEl;
  if(node.typeId==='aiVideo'&&portId==='image'){
    const frameDiv=content.querySelector('#d_vfFrame');if(!frameDiv)return;
    const url=getPrimaryDataUrl(data);
    frameDiv.innerHTML=url?'<img src="'+url+'" style="max-width:100%;max-height:150px;border-radius:6px">':'<p style="color:var(--text-muted);font-size:.78rem">等待上游输入...</p>';
    return;
  }
  if(node.typeId==='importVideo'&&portId==='video'){
    const url=getPrimaryDataUrl(data);
    if(url)loadVideoBlob(nodeId,url,data.summary||'上游视频');
    return;
  }
  if(node.typeId==='selectFrames'&&portId==='frames'){
    if(data&&Array.isArray(data.frames)){
      const syncFrames=()=>CM.pushData(nodeId,'frames',getSelectedFramePayload(data.frames));
      renderFrameGrid(content,data.frames,syncFrames);
    }
    return;
  }
  if(node.typeId==='directSprite'&&portId==='frames'){
    const heightInput=content.querySelector('#d_dH');
    const widthInput=content.querySelector('#d_dW');
    const frames=getSelectedFrames(data&&Array.isArray(data.frames)?data.frames:[]);
    if(heightInput&&widthInput&&frames.length&&frames[0]._w){
      const w=parseInt(widthInput.value)||512;
      heightInput.value=Math.round(w/frames[0]._w*frames[0]._h);
    }
    return;
  }
  if(node.typeId==='img2img'&&portId==='images'){
    const input=content.querySelector('#d_i2iInput');if(!input)return;
    const urls=data&&data.urls?data.urls:[];
    input.innerHTML=urls.length?urls.map(u=>'<img src="'+u+'" style="max-width:90px;max-height:70px;border-radius:4px;margin:2px">').join(''):'<p style="color:var(--text-muted);font-size:.78rem">等待上游输入</p>';
    return;
  }
  if(node.typeId==='removeBg'&&portId==='images'){
    const cv=content.querySelector('#pickerCanvas');
    if(!cv)return;
    const ctx=cv.getContext('2d');
    const previewUrl=(data&&data.urls&&data.urls[0])||null;
    const safePreviewUrl=buildImageSourceUrl(previewUrl);
    if(safePreviewUrl){const img=new Image();img.onload=()=>{cv.width=img.width;cv.height=img.height;ctx.drawImage(img,0,0)};img.src=safePreviewUrl}
    return;
  }
  if(node.typeId==='composeSprite'&&portId==='processed'){
    const heightInput=content.querySelector('#d_sH');
    const widthInput=content.querySelector('#d_sW');
    const frames=data&&Array.isArray(data.frames)?data.frames:[];
    if(heightInput&&widthInput&&frames.length&&frames[0]._w){
      const w=parseInt(widthInput.value)||512;
      heightInput.value=Math.round(w/frames[0]._w*frames[0]._h);
    }
    return;
  }
  if(node.typeId==='export'&&portId==='sprite'){
    const preview=content.querySelector('#d_expPreview');if(!preview)return;
    preview.innerHTML=data&&data.dataUrl?'<img src="'+data.dataUrl+'" style="max-width:100%;border-radius:6px">':'<p style="color:var(--text-muted);font-size:.78rem">等待精灵图数据...</p>';
    return;
  }
  if(node.typeId==='export'&&portId==='images'){
    const preview=content.querySelector('#d_expPreview');if(!preview)return;
    const url=getPrimaryDataUrl(data);
    preview.innerHTML=url?'<img src="'+url+'" style="max-width:100%;border-radius:6px">':'<p style="color:var(--text-muted);font-size:.78rem">等待图片数据...</p>';
  }
}
const CM={
  conns:[],svg:null,pendingReconnect:null,
  init(){this.svg=document.getElementById('wfConnections');
    // Click to delete connection
    this.svg.addEventListener('click',e=>{if(e.target.tagName==='path'&&!e.target.classList.contains('wf-temp-line')){
      const idx=this.conns.findIndex(c=>c.el===e.target);
      if(idx>=0){this.removeConn(this.conns[idx])}}});
    // Right-click connection to show disconnect menu
    this.svg.addEventListener('contextmenu',e=>{
      if(e.target.tagName==='path'&&!e.target.classList.contains('wf-temp-line')){
        e.preventDefault();e.stopPropagation();
        const c=this.conns.find(c=>c.el===e.target);if(!c)return;
        openContextMenu(e.clientX,e.clientY,[
          {label:'断开连线',action:()=>this.removeConn(c)},
          {label:'重新连接',action:()=>this.beginReconnect(c)}
        ]);
      }
    });
  },
  applyConnData(conn,data){
    const n=NM.nodes[conn.to];if(!n)return;
    const store=ensureNodeDataStore(n);
    const toType=n.def.ins.find(p=>p.id===conn.tp);
    const converted=convertData(data,conn.type,toType?toType.type:conn.type);
    if(converted===null){showToast('端口类型不兼容','warning');return}
    store.inputs[conn.tp]=converted;
    NM.setSummary(conn.to,converted.summary||'已接收数据');
    syncNodeInputPreview(conn.to,conn.tp,converted);
  },
  removeConn(conn){
    const idx=this.conns.indexOf(conn);
    if(idx>=0)this.conns.splice(idx,1);
    const targetNode=NM.nodes[conn.to];
    if(targetNode&&targetNode.data&&targetNode.data.inputs)delete targetNode.data.inputs[conn.tp];
    if(conn.el&&conn.el.parentNode)conn.el.parentNode.removeChild(conn.el);
  },
  beginReconnect(conn){
    this.pendingReconnect={snapshot:{from:conn.from,fp:conn.fp,to:conn.to,tp:conn.tp,type:conn.type}};
    this.removeConn(conn);
    showToast('选择新的输入端口，或点击空白取消','info',2500);
  },
  cancelReconnect(){
    if(!this.pendingReconnect)return;
    const snap=this.pendingReconnect.snapshot;this.pendingReconnect=null;
    this.addConn(snap.from,snap.fp,snap.to,snap.tp,snap.type);
  },
  completeReconnect(toId,tp,toType){
    if(!this.pendingReconnect)return;
    const snap=this.pendingReconnect.snapshot;
    this.pendingReconnect=null;
    if(!canConnect(snap.type,toType)){this.addConn(snap.from,snap.fp,snap.to,snap.tp,snap.type);showToast('端口类型不兼容，已恢复原连接','warning');return}
    this.addConn(snap.from,snap.fp,toId,tp,snap.type);
  },
  openInputDisconnectMenu(nodeId,portId,x,y){
    const upstream=this.getUpstream(nodeId,portId);
    if(!upstream.length){showToast('该输入端口没有连接','info');return}
    openContextMenu(x,y,upstream.map(conn=>({label:'断开 '+NM.nodes[conn.from].def.title+' → '+NM.nodes[conn.to].def.title,action:()=>this.removeConn(conn)})));
  },
  addConn(from,fp,to,tp,type){
    this.conns=this.conns.filter(c=>{if(c.to===to&&c.tp===tp){if(c.el&&c.el.parentNode)c.el.parentNode.removeChild(c.el);const targetNode=NM.nodes[c.to];if(targetNode&&targetNode.data&&targetNode.data.inputs)delete targetNode.data.inputs[c.tp];return false}return true});
    const path=document.createElementNS('http://www.w3.org/2000/svg','path');
    path.style.stroke=PORT_COLORS[type]||'#63b3ed';
    this.svg.appendChild(path);
    const conn={from,fp,to,tp,type,el:path};
    this.conns.push(conn);
    const fromNode=NM.nodes[from];
    if(fromNode){
      const store=ensureNodeDataStore(fromNode);
      if(store.outputs[fp]!=null)this.applyConnData(conn,store.outputs[fp]);
    }
    this.update();
  },
  update(){
    this.conns.forEach(c=>{
      const fromPort=NM.nodes[c.from].el.querySelector('.wf-port.out[data-port="'+c.fp+'"] .wf-port-dot');
      const toPort=NM.nodes[c.to].el.querySelector('.wf-port.in[data-port="'+c.tp+'"] .wf-port-dot');
      if(!fromPort||!toPort)return;
      const fr=fromPort.getBoundingClientRect();const tr=toPort.getBoundingClientRect();
      const x1=(fr.left+fr.width/2-CC.tx)/CC.scale;const y1=(fr.top+fr.height/2-CC.ty-48)/CC.scale;
      const x2=(tr.left+tr.width/2-CC.tx)/CC.scale;const y2=(tr.top+tr.height/2-CC.ty-48)/CC.scale;
      const dx=Math.max(Math.abs(x2-x1)*.5,50);
      c.el.setAttribute('d','M'+x1+','+y1+' C'+(x1+dx)+','+y1+' '+(x2-dx)+','+y2+' '+x2+','+y2);
    });
  },
  getUpstream(nodeId,portId){return this.conns.filter(c=>c.to===nodeId&&c.tp===portId)},
  getDownstream(nodeId,portId){return this.conns.filter(c=>c.from===nodeId&&c.fp===portId)},
  getInputData(nodeId,portId){
    const node=NM.nodes[nodeId];
    if(node){
      const store=ensureNodeDataStore(node);
      if(store.inputs[portId]!=null)return store.inputs[portId];
    }
    const upstream=this.getUpstream(nodeId,portId);
    if(!upstream.length)return null;
    if(upstream.length>1)console.warn('CM.getInputData: 多上游连接,仅取第一个',nodeId,portId,upstream.length);
    const conn=upstream[0];
    const fromNode=NM.nodes[conn.from];
    if(!fromNode)return null;
    const store=ensureNodeDataStore(fromNode);
    return store.outputs[conn.fp]??null;
  },
  getOutputData(nodeId,portId){
    const node=NM.nodes[nodeId];if(!node)return null;
    const store=ensureNodeDataStore(node);
    return store.outputs[portId]??null;
  },
  pushData(nodeId,portId,data){
    const node=NM.nodes[nodeId];
    if(node){
      const store=ensureNodeDataStore(node);
      store.outputs[portId]=data;
    }
    this.getDownstream(nodeId,portId).forEach(c=>this.applyConnData(c,data));
  },
};

function convertData(data,fromType,toType){
  if(fromType===toType)return data;
  if(fromType==='frames'&&toType==='image'&&data.frames){
    const urls=data.frames.filter(f=>f.selected!==false).map(f=>f.dataUrl);
    return{urls,frames:data.frames,summary:data.summary||(urls.length+' 张图片')};
  }
  if(fromType==='sprite'&&toType==='image'&&data.dataUrl){
    return{urls:[data.dataUrl],sourceFrames:data.sourceFrames||null,spriteFrames:data.frames||null,meta:data.meta||null,summary:data.summary||'精灵图'};
  }
  return null;
}
function getSelectedFrames(frames){return(frames||[]).filter(f=>f.selected!==false)}
function getSelectedFramePayload(frames,summarySuffix='帧'){const selectedFrames=getSelectedFrames(frames);return{frames:selectedFrames,summary:selectedFrames.length+' '+summarySuffix}}
function getNodeFrameOutput(node){
  const data=CM.getOutputData(node.id,'frames');
  return data&&Array.isArray(data.frames)?data.frames:[];
}
function getNodeFrameSource(node){
  const inputData=CM.getInputData(node.id,'frames');
  if(inputData&&Array.isArray(inputData.frames)&&inputData.frames.length)return inputData.frames;
  const outputData=CM.getOutputData(node.id,'frames');
  if(outputData&&Array.isArray(outputData.frames)&&outputData.frames.length)return outputData.frames;
  return [];
}
function getNodeFrameInput(node){
  const data=CM.getInputData(node.id,'frames');
  return data&&Array.isArray(data.frames)?data.frames:[];
}
function getNodeImageFrames(node){
  const data=CM.getInputData(node.id,'images');
  return data&&Array.isArray(data.frames)?data.frames:[];
}
function renderUrlGrid(container,urls){
  if(!container)return;
  container.innerHTML='<div class="frames-grid">'+urls.map((url,idx)=>'<div class="frame-item selected"><img src="'+url+'"><div class="frame-number">#'+(idx+1)+'</div></div>').join('')+'</div>';
}
function buildUrlFrames(urls){
  return(urls||[]).map((url,idx)=>({id:idx,dataUrl:buildImageSourceUrl(url),selected:true}));
}
function loadImageElement(url){
  return new Promise((resolve,reject)=>{const im=new Image();im.onload=()=>resolve(im);im.onerror=reject;im.src=url});
}
function getSpriteFrameRect(frame){
  if(!frame)return{x:0,y:0,w:0,h:0};
  if(frame.frame)return{x:frame.frame.x||0,y:frame.frame.y||0,w:frame.frame.w||0,h:frame.frame.h||0};
  return{x:frame.x||0,y:frame.y||0,w:frame.width||frame.w||0,h:frame.height||frame.h||0};
}
async function buildFramesFromSpriteData(spriteData){
  const spriteUrl=getPrimaryDataUrl(spriteData);
  const spriteFrames=spriteData&&Array.isArray(spriteData.spriteFrames)?spriteData.spriteFrames:(spriteData&&Array.isArray(spriteData.frames)?spriteData.frames:[]);
  if(!spriteUrl||!spriteFrames.length)return buildUrlFrames(spriteData&&spriteData.urls?spriteData.urls:[]);
  const img=await loadImageElement(spriteUrl);
  return spriteFrames.map((frame,idx)=>{const rect=getSpriteFrameRect(frame);const c=document.createElement('canvas');c.width=rect.w;c.height=rect.h;const ctx=c.getContext('2d');ctx.drawImage(img,rect.x,rect.y,rect.w,rect.h,0,0,rect.w,rect.h);return{id:idx,dataUrl:c.toDataURL('image/png'),_w:rect.w,_h:rect.h,selected:true}});
}
async function buildFramesFromSpriteAtlas(spriteData){
  return buildFramesFromSpriteData(spriteData);
}
async function resolveImageInputFrames(node){
  const data=CM.getInputData(node.id,'images');
  if(data&&Array.isArray(data.frames)&&data.frames.length)return data.frames;
  if(data&&Array.isArray(data.spriteFrames)&&data.spriteFrames.length)return buildFramesFromSpriteData(data);
  if(data&&Array.isArray(data.urls)&&data.urls.length)return buildUrlFrames(data.urls);
  return [];
}
function getNodeProcessedFrames(node){
  const data=CM.getInputData(node.id,'processed');
  return data&&Array.isArray(data.frames)?data.frames:S.processedFrames;
}

function getResultPreviewList(result){
  if(!result||!result.data)return [];
  if(Array.isArray(result.data.urls))return result.data.urls.filter(Boolean);
  const primary=getPrimaryDataUrl(result.data);
  return primary?[primary]:[];
}
function getResultPreviewUrl(result){const list=getResultPreviewList(result);return result&&result.previewUrl?result.previewUrl:(list[0]||null)}
function getResultDownloadUrl(result){
  if(!result)return null;
  if(result.fileUrl)return result.fileUrl;
  if(result.downloadUrl)return result.downloadUrl;
  if(result.data)return getPrimaryDataUrl(result.data);
  return null;
}
function renderResultsPanel(){
  const list=document.getElementById('resultsList');
  if(!list)return;
  const items=(S.resultLibrary||[]).slice().sort((a,b)=>new Date(b.createdAt||0)-new Date(a.createdAt||0));
  if(!items.length){list.innerHTML='<div class="result-empty">暂无结果记录</div>';return}
  list.innerHTML=items.map(item=>{
    const previews=getResultPreviewList(item);
    const preview=getResultPreviewUrl(item);
    const typeLabel=RESULT_TYPE_LABELS[item.type]||item.type||'结果';
    const time=item.createdAt?new Date(item.createdAt).toLocaleString():'未知时间';
    const previewHtml=item.type==='video'&&preview
      ? '<video src="'+preview+'" controls preload="metadata"></video>'
      : previews.length>1
        ? '<div class="frames-grid">'+previews.map((url,idx)=>'<div class="frame-item selected" style="aspect-ratio:1/1"><img src="'+url+'" loading="lazy"><div class="frame-number">#'+(idx+1)+'</div></div>').join('')+'</div>'
        : preview
          ? '<img src="'+preview+'" loading="lazy">'
          : '<div class="result-empty">无预览</div>';
    return '<div class="result-card" data-result-id="'+item.id+'"><div class="result-preview">'+previewHtml+'</div><div class="result-body"><div class="result-type">'+typeLabel+'</div><div class="result-summary">'+(item.summary||'未命名结果')+'</div><div class="result-meta">来源节点：'+(item.sourceNodeType||'-')+' · '+time+'</div>'+(item.prompt?'<div class="result-meta">描述：'+item.prompt+'</div>':'')+(item.filePath?'<div class="result-path">'+item.filePath+'</div>':'')+'<div class="result-actions"><button class="secondary" data-result-download="'+item.id+'">下载</button><button class="accent" data-result-reuse="'+item.id+'">复用</button></div></div></div>';
  }).join('');
  list.querySelectorAll('[data-result-download]').forEach(btn=>btn.addEventListener('click',()=>downloadResultRecord(btn.dataset.resultDownload)));
  list.querySelectorAll('[data-result-reuse]').forEach(btn=>btn.addEventListener('click',()=>reuseResultRecord(btn.dataset.resultReuse)));
}
function toggleResultsPanel(forceOpen){
  const panel=document.getElementById('resultsPanel');
  if(!panel)return;
  const shouldOpen=typeof forceOpen==='boolean'?forceOpen:!panel.classList.contains('open');
  panel.classList.toggle('open',shouldOpen);
  if(shouldOpen){PM.loadResults();renderResultsPanel();}
}
function buildResultRecord(type,node,data,summary,extra={}){
  const nodeId=node&&node.id?node.id:(extra.sourceNodeId||'unknown');
  const nodeType=node&&node.typeId?node.typeId:(extra.sourceNodeType||'unknown');
  return {
    id:'result_'+Date.now()+'_'+Math.random().toString(16).slice(2,8),
    type,
    createdAt:new Date().toISOString(),
    sourceNodeId:nodeId,
    sourceNodeType:nodeType,
    prompt:extra.prompt||'',
    summary:summary||extra.summary||type,
    previewUrl:extra.previewUrl||getPrimaryDataUrl(data)||'',
    downloadUrl:extra.downloadUrl||getPrimaryDataUrl(data)||'',
    fileUrl:extra.fileUrl||'',
    filePath:extra.filePath||'',
    data:cloneValue(data||{}),
    meta:cloneValue(extra.meta||{})
  };
}
async function persistResultRecord(record){
  try{
    const r=await fetch('/api/results',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(record)});
    if(!r.ok)return record;
    const saved=await r.json().catch(()=>null);
    return saved&&saved.record?saved.record:record;
  }catch{return record}
}
async function recordResult(type,node,data,summary,extra={}){
  const record=buildResultRecord(type,node,data,summary,extra);
  const saved=await persistResultRecord(record);
  S.resultLibrary=S.resultLibrary||[];
  S.resultLibrary.unshift(saved);
  PM.saveResults();
  renderResultsPanel();
  return saved;
}
function downloadResultRecord(resultId){
  const result=(S.resultLibrary||[]).find(item=>item.id===resultId);
  if(!result)return;
  const url=getResultDownloadUrl(result);
  if(!url){showToast('该结果没有可下载地址','warning');return}
  const a=document.createElement('a');
  a.href=url;
  a.download=(result.type||'result')+(result.type==='gif'?'.gif':result.type==='video'?'.mp4':'.png');
  a.target='_blank';
  document.body.appendChild(a);
  a.click();
  a.remove();
}
function buildReusePayloadForResult(result){
  if(!result)return null;
  if(result.type==='image')return{type:'image',payload:result.data&&result.data.urls?result.data:{urls:getResultPreviewList(result),summary:result.summary||'图片结果'}};
  if(result.type==='video')return{type:'video',payload:result.data&&result.data.url?result.data:{url:result.previewUrl||result.downloadUrl,summary:result.summary||'视频结果'}};
  if(result.type==='sprite')return{type:'sprite',payload:result.data||null};
  return null;
}
function reuseResultRecord(resultId){
  const result=(S.resultLibrary||[]).find(item=>item.id===resultId);
  if(!result){showToast('未找到结果记录','warning');return}
  const reuse=buildReusePayloadForResult(result);
  if(!reuse||!reuse.payload){showToast('该结果暂不支持复用','warning');return}
  const selectedNode=NM.selected&&NM.nodes[NM.selected]?NM.nodes[NM.selected]:null;
  if(!selectedNode){showToast('请先选中一个目标节点','warning');return}
  const targetPort=selectedNode.def.ins.find(port=>port.type===reuse.type||canConnect(reuse.type,port.type));
  if(!targetPort){showToast('当前选中节点不接受该结果类型','warning');return}
  const store=ensureNodeDataStore(selectedNode);
  store.inputs[targetPort.id]=reuse.payload;
  syncNodeInputPreview(selectedNode.id,targetPort.id,reuse.payload);
  NM.setSummary(selectedNode.id,reuse.payload.summary||result.summary||'已接收结果');
  showToast('结果已复用到当前节点','success');
}

const PM={
  KEY:'spritetool_wf_layout',
  RESULTS_KEY:'spritetool_result_library',
  save(){
    const d={
      version:4,
      nodes:Object.values(NM.nodes).map(n=>({id:n.id,typeId:n.typeId,x:parseInt(n.el.style.left),y:parseInt(n.el.style.top),collapsed:!!n.collapsed,config:cloneValue(n.config||{}),runtime:cloneValue(n.runtime||{}),status:n.status||'idle'})),
      conns:CM.conns.map(c=>({from:c.from,fp:c.fp,to:c.to,tp:c.tp,type:c.type}))
    };
    localStorage.setItem(this.KEY,JSON.stringify(d));
    this.saveResults();
  },
  saveResults(){
    localStorage.setItem(this.RESULTS_KEY,JSON.stringify(S.resultLibrary||[]));
  },
  loadResults(){
    try{const raw=JSON.parse(localStorage.getItem(this.RESULTS_KEY));S.resultLibrary=Array.isArray(raw)?raw:[]}catch{S.resultLibrary=[]}
  },
  inflate(d){
    Object.values(NM.nodes).forEach(n=>{if(n.el&&n.el.parentNode)n.el.parentNode.removeChild(n.el)});
    NM.nodes={};NM.selected=null;
    CM.conns.forEach(c=>{if(c.el&&c.el.parentNode)c.el.parentNode.removeChild(c.el)});CM.conns=[];
    d.nodes.forEach(entry=>{
      const nd=CATALOG_BY_TYPE[entry.typeId];if(!nd)return;
      NM.createNode(entry.id,entry.x,entry.y,nd);
      const node=NM.nodes[entry.id];
      node.config=cloneValue(entry.config||nd.defaultConfig||{});
      node.runtime=cloneValue(entry.runtime||{});
      node.status=entry.status||'idle';
      if(node.status==='processing')node.status='idle';
      if(node.status==='done')node.el.classList.add('done');
      node.collapsed=!!entry.collapsed;
      if(node.collapsed){node.el.querySelector('.wf-node-body').classList.add('collapsed');node.el.querySelector('.wf-node-fold').textContent='+'}
    });
    d.conns.forEach(c=>{if(NM.nodes[c.from]&&NM.nodes[c.to])CM.addConn(c.from,c.fp,c.to,c.tp,c.type)});
  },
  migrateLegacyLayout(legacy){
    if(!legacy||!legacy.nodes||!legacy.conns)return null;
    const nodes=Object.entries(legacy.nodes).map(([id,v])=>{
      const typeId=v.typeId||(CATALOG_BY_TYPE[id]?id:null);
      if(!typeId)return null;
      return{id,typeId,x:v.x,y:v.y,collapsed:!!v.col,config:cloneValue(CATALOG_BY_TYPE[typeId].defaultConfig||{}),runtime:{},status:'idle'};
    });
    if(nodes.some(n=>!n))return null;
    return{version:4,nodes,conns:legacy.conns};
  },
  load(){
    this.loadResults();
    try{const raw=JSON.parse(localStorage.getItem(this.KEY));if(!raw)return false;
      const d=(raw.version===4||raw.version===3)?raw:this.migrateLegacyLayout(raw);if(!d)return false;
      if(d.version===3){d.version=4;d.nodes=d.nodes.map(n=>({...n,runtime:n.runtime||{},status:n.status||'idle'}));}
      this.inflate(d);return true;
    }catch{return false}
  },
  reset(){localStorage.removeItem(this.KEY);localStorage.removeItem(this.RESULTS_KEY);location.reload()}
};

// === Bind Functions (scoped to node content element) ===
function bindAiImage(node,content){
  const runtime=ensureNodeRuntime(node);
  let aiRefData=runtime.aiRefData||null;
  const $=s=>content.querySelector(s);
  const toggle=$('#d_aiRefToggle'),area=$('#d_aiRefArea'),drop=$('#d_aiRefDrop'),file=$('#d_aiRefFile'),prev=$('#d_aiRefPreview'),img=$('#d_aiRefImg'),clear=$('#d_aiRefClear');
  const upstreamData=CM.getInputData(node.id,'images');
  const upstreamUrls=upstreamData&&upstreamData.urls?upstreamData.urls:[];
  const upstreamInput=$('#d_aiInput');
  if(node.config&&node.config.prompt!=null)$('#d_aiPrompt').value=node.config.prompt;
  if(node.config&&node.config.model)$('#d_aiModel').value=node.config.model;
  if(node.config&&node.config.ratio)$('#d_aiRatio').value=node.config.ratio;
  if(node.config&&node.config.strength!=null){$('#d_aiStrength').value=node.config.strength;$('#d_aiStrengthVal').textContent=((node.config.strength||50)/100).toFixed(1)}
  if(upstreamUrls.length){
    upstreamInput.style.display='block';
    upstreamInput.innerHTML=upstreamUrls.map(u=>'<img src="'+u+'" style="max-width:90px;max-height:70px;border-radius:4px;margin:2px">').join('');
  }
  if(runtime.useReference||aiRefData||upstreamUrls.length){
    toggle.checked=runtime.useReference!==false;
    area.style.display=toggle.checked?'block':'none';
  }
  if(aiRefData){
    img.src=aiRefData;
    prev.style.display='block';
  }else if(toggle.checked&&upstreamUrls.length){
    aiRefData=upstreamUrls[0];
    img.src=aiRefData;
    prev.style.display='block';
  }
  toggle.addEventListener('change',()=>{runtime.useReference=toggle.checked;area.style.display=toggle.checked?'block':'none';if(!toggle.checked){aiRefData=null;runtime.aiRefData=null;prev.style.display='none'}PM.save()});
  drop.addEventListener('click',()=>file.click());
  drop.addEventListener('dragover',e=>{e.preventDefault();drop.classList.add('dragover')});
  drop.addEventListener('dragleave',()=>drop.classList.remove('dragover'));
  drop.addEventListener('drop',e=>{e.preventDefault();drop.classList.remove('dragover');if(e.dataTransfer.files[0])loadRef(e.dataTransfer.files[0])});
  file.addEventListener('change',()=>{if(file.files[0])loadRef(file.files[0])});
  clear.addEventListener('click',()=>{aiRefData=null;runtime.aiRefData=null;prev.style.display='none';PM.save()});
  function loadRef(f){const r=new FileReader();r.onload=e=>{aiRefData=e.target.result;runtime.aiRefData=aiRefData;img.src=aiRefData;prev.style.display='block';toggle.checked=true;runtime.useReference=true;area.style.display='block';PM.save()};r.readAsDataURL(f)}
  $('#d_aiPrompt').addEventListener('input',()=>{node.config.prompt=$('#d_aiPrompt').value;PM.save()});
  $('#d_aiModel').addEventListener('change',()=>{node.config.model=$('#d_aiModel').value;PM.save()});
  $('#d_aiRatio').addEventListener('change',()=>{node.config.ratio=$('#d_aiRatio').value;PM.save()});
  $('#d_aiStrength').addEventListener('input',e=>{const v=parseInt(e.target.value)||50;$('#d_aiStrengthVal').textContent=(v/100).toFixed(1);node.config.strength=v;PM.save()});
  $('#d_aiGenBtn').addEventListener('click',async()=>{
    const pr=$('#d_aiPrompt').value.trim();if(!pr){showToast('请输入描述','warning');return}
    const btn=$('#d_aiGenBtn');btn.disabled=true;btn.textContent='生成中...';
    const res=$('#d_aiResults');res.innerHTML='<div class="ai-loading"><div class="spinner"></div>生成中...</div>';
    runtime.generatedImages=[];runtime.selectedImageIds=[];
    S.generatedImages[node.id]=[];S.selectedImages[node.id]=null;
    try{
      const body={model:$('#d_aiModel').value,prompt:pr,ratio:$('#d_aiRatio').value,resolution:'2k',sample_strength:($('#d_aiStrength').value/100),response_format:'url'};
      const inputImages=[];
      if(aiRefData&&toggle.checked)inputImages.push(aiRefData);
      else if(upstreamUrls.length&&toggle.checked)inputImages.push(upstreamUrls[0]);
      if(inputImages.length)body.images=inputImages;
      const data=await fetchJimengAPI('images/generations',{method:'POST',body:JSON.stringify(body)});
      const imgs=(data.data||[]).filter(d=>d.url);if(!imgs.length)throw new Error('未生成图片');
      const resultUrls=imgs.map(im=>im.url);
      runtime.generatedImages=resultUrls.map((url,i)=>({id:i,url,selected:false}));
      S.generatedImages[node.id]=cloneValue(runtime.generatedImages);
      renderAiResults(res,node.id);
      NM.setStatus(node.id,'done');NM.setSummary(node.id,imgs.length+' 张图片');
      CM.pushData(node.id,'images',{urls:resultUrls,summary:imgs.length+' 张图片'});
      await recordResult('image',node,{urls:resultUrls,summary:imgs.length+' 张图片'},imgs.length+' 张图片',{prompt:pr,previewUrl:resultUrls[0]||''});
      PM.save();
      showToast('已生成 '+imgs.length+' 张','success');
    }catch(e){res.innerHTML='<p style="color:var(--danger);text-align:center;padding:12px;font-size:.82rem">失败: '+e.message+'</p>';showToast('失败: '+e.message,'error')}
    finally{btn.disabled=false;btn.textContent='生成图片'}
  });
  if(runtime.generatedImages&&runtime.generatedImages.length){S.generatedImages[node.id]=cloneValue(runtime.generatedImages);renderAiResults($('#d_aiResults'),node.id)}
}
function renderAiResults(container,nodeId){
  const node=NM.nodes[nodeId];
  const runtime=node?ensureNodeRuntime(node):{};
  const imgs=(runtime.generatedImages&&runtime.generatedImages.length)?runtime.generatedImages:(S.generatedImages[nodeId]||[]);
  if(!imgs.length){container.innerHTML='<p style="color:var(--text-muted);text-align:center;padding:20px 0;font-size:.78rem">暂无结果</p>';return}
  container.innerHTML='<div class="ai-results-grid">'+imgs.map(im=>
    '<div class="ai-result-item'+(im.selected?' selected':'')+'" data-aiid="'+im.id+'"><img src="'+im.url+'" loading="lazy"><div class="arc"><svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="3" width="12" height="12"><polyline points="20 6 9 17 4 12"/></svg></div></div>'
  ).join('')+'</div>';
  container.querySelectorAll('.ai-result-item').forEach(el=>{
    el.addEventListener('click',()=>{
      const id=parseInt(el.dataset.aiid);const im=imgs.find(i=>i.id===id);
      if(im){im.selected=!im.selected;el.classList.toggle('selected',im.selected);
        runtime.generatedImages=imgs;
        runtime.selectedImageIds=imgs.filter(i=>i.selected).map(i=>i.id);
        S.generatedImages[nodeId]=cloneValue(imgs);
        S.selectedImages[nodeId]=imgs.find(i=>i.selected)||null;
        if(S.selectedImages[nodeId]){CM.pushData(nodeId,'images',{urls:[S.selectedImages[nodeId].url],summary:'已选图片'})}
        else{CM.pushData(nodeId,'images',{urls:imgs.map(i=>i.url),summary:imgs.length+' 张图片'})}
        PM.save();
      }
    });
  });
}

// --- AI Video ---
function bindAiVideo(node,content){
  const runtime=ensureNodeRuntime(node);
  let manualFirstUrl=runtime.manualFirstUrl||null,vfPollAbort=null;
  const $=s=>content.querySelector(s);
  const frameDiv=$('#d_vfFrame'),fileIn=$('#d_vfFile');
  const upstreamData=CM.getInputData(node.id,'image');
  const upstreamFirstUrl=getPrimaryDataUrl(upstreamData);
  if(node.config&&node.config.prompt!=null)$('#d_vfPrompt').value=node.config.prompt;
  if(node.config&&node.config.model)$('#d_vfModel').value=node.config.model;
  if(node.config&&node.config.duration)$('#d_vfDur').value=node.config.duration;
  if(node.config&&node.config.ratio)$('#d_vfRatio').value=node.config.ratio;
  const initialFrameUrl=manualFirstUrl||upstreamFirstUrl;
  if(initialFrameUrl)frameDiv.innerHTML='<img src="'+initialFrameUrl+'" style="max-width:100%;max-height:150px;border-radius:6px">';
  $('#d_vfPrompt').addEventListener('input',()=>{node.config.prompt=$('#d_vfPrompt').value;PM.save()});
  $('#d_vfModel').addEventListener('change',()=>{node.config.model=$('#d_vfModel').value;PM.save()});
  $('#d_vfDur').addEventListener('change',()=>{node.config.duration=Number($('#d_vfDur').value);PM.save()});
  $('#d_vfRatio').addEventListener('change',()=>{node.config.ratio=$('#d_vfRatio').value;PM.save()});
  $('#d_vfUpload').addEventListener('click',()=>fileIn.click());
  fileIn.addEventListener('change',()=>{const f=fileIn.files[0];if(!f)return;const r=new FileReader();r.onload=e=>{manualFirstUrl=e.target.result;runtime.manualFirstUrl=manualFirstUrl;frameDiv.innerHTML='<img src="'+manualFirstUrl+'" style="max-width:100%;max-height:150px;border-radius:6px">';PM.save()};r.readAsDataURL(f)});
  $('#d_vfGenBtn').addEventListener('click',async()=>{
    const currentInput=CM.getInputData(node.id,'image');
    const vfFirstUrl=manualFirstUrl||getPrimaryDataUrl(currentInput);
    if(!vfFirstUrl){showToast('请设置首帧','warning');return}
    const btn=$('#d_vfGenBtn');btn.disabled=true;btn.textContent='生成中...';
    const res=$('#d_vfResult');res.innerHTML='<div class="ai-loading"><div class="spinner"></div>生成中...</div>';
    NM.setStatus(node.id,'processing');
    try{
      const prompt=$('#d_vfPrompt').value.trim()||'缓慢动画';
      const body={model:$('#d_vfModel').value,prompt,duration:parseInt($('#d_vfDur').value),ratio:$('#d_vfRatio').value,resolution:'720p',file_paths:[vfFirstUrl]};
      const sub=await fetchJimengAPI('videos/generations/async',{method:'POST',body:JSON.stringify(body)});
      const tid=sub.task_id;if(!tid)throw new Error('未获取到任务 ID');
      vfPollAbort={cancelled:false};
      res.innerHTML='<div class="ai-loading"><div class="spinner"></div>排队中...<br><button class="secondary" id="d_vfCancel" style="margin-top:6px">取消</button></div>';
      $('#d_vfCancel')&&$('#d_vfCancel').addEventListener('click',()=>{vfPollAbort.cancelled=true});
      const result=await pollVideoTask(tid,res,vfPollAbort);
      runtime.generatedVideoUrl=result.url;
      S.generatedVideo=result.url;
      renderVideoResult(res,result,node.id);
      NM.setStatus(node.id,'done');NM.setSummary(node.id,'视频已就绪');
      CM.pushData(node.id,'video',{url:result.url,summary:'视频已就绪'});
      await recordResult('video',node,{url:result.url,summary:'视频已就绪'},'视频已就绪',{prompt,previewUrl:buildVideoSourceUrl(result.url)});
      PM.save();
      showToast('视频生成完成','success');
    }catch(e){res.innerHTML='<p style="color:var(--danger);text-align:center;padding:12px;font-size:.82rem">失败: '+e.message+'</p>';NM.setStatus(node.id,'idle');showToast('失败: '+e.message,'error')}
    finally{btn.disabled=false;btn.textContent='生成视频'}
  });
  if(runtime.generatedVideoUrl){renderVideoResult($('#d_vfResult'),{url:runtime.generatedVideoUrl},node.id)}
}
async function pollVideoTask(tid,res,abort){
  for(let i=0;i<120;i++){
    await new Promise(r=>setTimeout(r,5000));if(abort&&abort.cancelled)throw new Error('已取消');
    try{const d=await fetchJimengAPI('videos/generations/async/'+tid);
      if(d.status==='succeeded'&&d.data&&d.data[0])return d.data[0];
      if(d.status==='failed')throw new Error(d.error||'生成失败');
    }catch(e){if(e.message.includes('生成失败')||e.message==='已取消')throw e}
  }throw new Error('超时');
}
function renderVideoResult(container,result,nodeId){
  const proxySrc=buildVideoSourceUrl(result.url);
  container.innerHTML='<div style="text-align:center"><video controls autoplay loop style="max-width:100%;max-height:240px;border-radius:8px" src="'+proxySrc+'"></video><div style="margin-top:8px;display:flex;gap:6px;justify-content:center"><button class="accent" id="d_vfDown">下载</button><button class="success" id="d_vfUse">使用此视频</button></div></div>';

async function downloadVideoViaProxy(url){showToast('下载中...','info');try{const proxySrc=buildVideoSourceUrl(url);const a=document.createElement('a');a.href=proxySrc;a.download='ai-video.mp4';a.target='_blank';document.body.appendChild(a);a.click();a.remove();showToast('已触发下载','success')}catch(e){showToast('下载失败: '+e.message,'error')}}

function loadVideoFile(nodeId,f){const u=URL.createObjectURL(f);loadVideoBlob(nodeId,u,f.name)}
function loadVideoUrl(nodeId,u){const n=NM.nodes[nodeId];if(n&&n.contentEl){const v=n.contentEl.querySelector('#d_video');if(v){v.crossOrigin='anonymous';v.src=u;v.onloadedmetadata=()=>showVideoLoaded(nodeId,'URL 视频',v)}}}
async function loadVideoBlob(nodeId,u,name){
  const n=NM.nodes[nodeId];
  if(!n||!n.expanded||!n.contentEl){S.pendingVideos[nodeId]={blobUrl:u,name};return}
  const v=n.contentEl.querySelector('#d_video');
  if(!v){S.pendingVideos[nodeId]={blobUrl:u,name};return}
  let actualUrl=u;
  if(u&&typeof u==='string'&&!u.startsWith('blob:')&&!u.startsWith('data:')){
    try{
      showToast('正在下载视频...','info');
      const requestUrl=buildVideoSourceUrl(u);
      const r=await fetch(requestUrl);
      if(!r.ok)throw new Error('HTTP '+r.status);
      const b=await r.blob();
      actualUrl=URL.createObjectURL(b);
    }catch(e){
      showToast('视频加载失败: '+e.message,'error');
      return;
    }
  }
  v.src=actualUrl;v.onloadedmetadata=()=>showVideoLoaded(nodeId,name,v);
}
function showVideoLoaded(nodeId,name,v){

async function extractFrames(importNodeId,content){
  const v=content.querySelector('#d_video');if(!v||!v.duration)return;
  const fps=parseInt(content.querySelector('#d_fps').value);if(!fps)return;
  showProgress('正在提取帧...');NM.setStatus(importNodeId,'processing');
  const dur=v.duration,total=Math.floor(dur*fps),c=document.createElement('canvas'),ctx=c.getContext('2d');
  c.width=v.videoWidth;c.height=v.videoHeight;S.frames=[];
  for(let i=0;i<total;i++){v.currentTime=i/fps;await new Promise(r=>{v.onseeked=()=>{ctx.drawImage(v,0,0);S.frames.push({id:i,dataUrl:c.toDataURL('image/png'),_w:c.width,_h:c.height,selected:true});updateProgress((i+1)/total*100);r()}});
  }
  hideProgress();
  const framesData={frames:S.frames,summary:total+' 帧'};
  const downstream=CM.getDownstream(importNodeId,'video');
  for(const conn of downstream){
    const sfNode=NM.nodes[conn.to];if(!sfNode)continue;
    if(sfNode.expanded&&sfNode.contentEl&&sfNode.typeId==='selectFrames'){const syncFrames=()=>CM.pushData(conn.to,'frames',getSelectedFramePayload(S.frames));renderFrameGrid(sfNode.contentEl,S.frames,syncFrames)}
    NM.setStatus(conn.to,'done');NM.setSummary(conn.to,total+' 帧');
  }
  CM.pushData(importNodeId,'video',CM.getOutputData(importNodeId,'video')||{blobUrl:v.src,summary:'视频已加载'});
  CM.pushData(importNodeId,'frames',framesData);
  const selectFrameTargets=CM.getDownstream(importNodeId,'video').filter(conn=>NM.nodes[conn.to]&&NM.nodes[conn.to].typeId==='selectFrames');
  selectFrameTargets.forEach(conn=>CM.pushData(conn.to,'frames',framesData));
  showToast('提取 '+total+' 帧','success');
}
function renderFrameGrid(content,frames,onChange){
  const grid=content.querySelector('#d_framesGrid');if(!grid)return;grid.innerHTML='';
  frames.forEach((f,idx)=>{
    const el=document.createElement('div');el.className='frame-item'+(f.selected?' selected':'');
    el.innerHTML='<div class="ci"><svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg></div><img src="'+f.dataUrl+'"><div class="frame-number">#'+(idx+1)+'</div>';
    el.addEventListener('click',e=>{
      if(e.shiftKey&&S.lastClickedFrame>=0){const from=Math.min(S.lastClickedFrame,idx),to=Math.max(S.lastClickedFrame,idx);const nv=!f.selected;for(let i=from;i<=to;i++)frames[i].selected=nv}
      else f.selected=!f.selected;
      S.lastClickedFrame=idx;renderFrameGrid(content,frames,onChange);updateFrameCount(content,frames);if(onChange)onChange(frames);
    });
    grid.appendChild(el);
  });
  updateFrameCount(content,frames);
}
function updateFrameCount(content,frames){
